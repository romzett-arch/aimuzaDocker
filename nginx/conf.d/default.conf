# AIMUZA — Nginx для локального Docker (docker-compose.local)
# Проксирует на контейнеры по именам (frontend, api, realtime и т.д.)

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
map $http_user_agent $is_bot {
    default 0;
    ~*(Googlebot|Google-InspectionTool|GoogleOther|AdsBot-Google|Bingbot|YandexBot|YandexImages|DuckDuckBot|Slurp|TelegramBot|facebookexternalhit|Twitterbot|vk\.com|LinkedInBot|WhatsApp|Slackbot|Discordbot) 1;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SEO: sitemap, robots (Edge Functions)
    location = /sitemap.xml {
        proxy_pass http://api:3000/functions/v1/sitemap-generator;
        proxy_read_timeout 30s;
        add_header Content-Type "application/xml; charset=utf-8";
    }
    location ~ ^/sitemap-([a-z]+)\.xml$ {
        set $sitemap_type $1;
        proxy_pass http://api:3000/functions/v1/sitemap-generator?type=$sitemap_type;
        proxy_read_timeout 30s;
        add_header Content-Type "application/xml; charset=utf-8";
    }
    location = /robots.txt {
        proxy_pass http://api:3000/functions/v1/robots-txt;
        proxy_read_timeout 10s;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # Frontend (React SPA), боты → og-renderer
    location / {
        if ($is_bot) {
            rewrite ^ /internal-og?url=$request_uri last;
        }
        proxy_pass http://frontend:80;
    }
    location = /internal-og {
        internal;
        proxy_pass http://api:3000/functions/v1/og-renderer?url=$arg_url;
        proxy_read_timeout 30s;
    }
    location /assets/ {
        proxy_pass http://frontend:80;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API (Supabase-compatible)
    location /auth/v1/ {
        proxy_pass http://api:3000/auth/v1/;
        proxy_read_timeout 120s;
    }
    location /rest/ {
        proxy_pass http://api:3000/rest/;
        proxy_read_timeout 120s;
    }
    location /storage/ {
        proxy_pass http://api:3000/storage/;
        proxy_read_timeout 120s;
    }
    location /functions/ {
        proxy_pass http://api:3000/functions/;
        proxy_read_timeout 300s;
    }
    location /rpc/ {
        proxy_pass http://api:3000/rpc/;
        proxy_read_timeout 120s;
    }

    # FFmpeg API
    location /api/ffmpeg/ {
        proxy_pass http://ffmpeg-api:3001/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Radio
    location /radio/stream.mp3 {
        proxy_pass http://radio:8000/radio.mp3;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        tcp_nodelay on;
        gzip off;
        add_header Access-Control-Allow-Origin "*" always;
    }
    location /radio/stream.opus {
        proxy_pass http://radio:8000/radio.opus;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        tcp_nodelay on;
        gzip off;
        add_header Access-Control-Allow-Origin "*" always;
    }
    location /radio/status {
        proxy_pass http://radio:8000/status-json.xsl;
    }
    location /radio/api/ {
        proxy_pass http://radio:3200/api/;
    }
    location /radio/ws {
        proxy_pass http://radio:3200/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Realtime WebSocket (Supabase Realtime)
    location /realtime/v1/websocket {
        proxy_pass http://realtime:4000/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    location /realtime/ {
        proxy_pass http://realtime:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Health
    location /health {
        proxy_pass http://api:3000/health;
    }
}
