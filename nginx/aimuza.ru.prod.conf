# AIMUZA — Nginx Production Config
# Этот файл заменит /etc/nginx/sites-available/aimuza.ru на сервере
# Системный Nginx проксирует на Docker-контейнеры (127.0.0.1)

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Определение ботов (bot-aware SEO fallback)
map $http_user_agent $is_bot {
    default 0;
    ~*(Googlebot|Google-InspectionTool|GoogleOther|AdsBot-Google|Bingbot|YandexBot|YandexImages|DuckDuckBot|Slurp|TelegramBot|facebookexternalhit|Twitterbot|vk\.com|LinkedInBot|WhatsApp|Slackbot|Discordbot) 1;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name aimuza.ru www.aimuza.ru;

    # Let's Encrypt challenge (нужен для certbot renew)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной блок
server {
    listen 443 ssl http2;
    server_name aimuza.ru www.aimuza.ru;

    # SSL (Let's Encrypt — уже на сервере)
    ssl_certificate /etc/letsencrypt/live/aimuza.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aimuza.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ─────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss:; media-src 'self' https: blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://auth.robokassa.ru https://auth.robokassa.kz;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # ── Gzip ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/wasm font/woff2 image/svg+xml;

    # ── Max upload size ──────────────────────────
    client_max_body_size 100M;
    client_body_timeout 120s;

    # ── Proxy defaults ───────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;


    # ══════════════════════════════════════════════
    # SEO: sitemap.xml, robots.txt (Edge Functions)
    # ══════════════════════════════════════════════
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000/functions/v1/sitemap-generator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Type "application/xml; charset=utf-8";
    }
    location ~ ^/sitemap-([a-z]+)\.xml$ {
        set $sitemap_type $1;
        proxy_pass http://127.0.0.1:3000/functions/v1/sitemap-generator?type=$sitemap_type;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Type "application/xml; charset=utf-8";
    }
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000/functions/v1/robots-txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # ══════════════════════════════════════════════
    # Робокасса: серверный редирект после оплаты
    # (надёжнее клиентского роутинга — работает даже со старым кэшем)
    # ══════════════════════════════════════════════
    location = /payment-success {
        return 302 /profile?payment=success;
    }
    location = /payment-fail {
        return 302 /profile?payment=fail;
    }

    # ══════════════════════════════════════════════
    # Frontend (React SPA) — контейнер aimuza-frontend:80
    # Боты → og-renderer для SEO/OG fallback
    # ══════════════════════════════════════════════
    location / {
        if ($is_bot) {
            rewrite ^ /internal-og?url=$request_uri last;
        }
        proxy_pass http://127.0.0.1:8080;
    }
    location = /internal-og {
        internal;
        proxy_pass http://127.0.0.1:3000/functions/v1/og-renderer?url=$arg_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика с длинным кэшем (assets от Vite)
    location /assets/ {
        proxy_pass http://127.0.0.1:8080;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ══════════════════════════════════════════════
    # API Server (Node.js) — контейнер aimuza-api:3000
    # ══════════════════════════════════════════════
    location /auth/v1/ {
        proxy_pass http://127.0.0.1:3000/auth/v1/;
        proxy_read_timeout 120s;
    }

    location /rest/ {
        proxy_pass http://127.0.0.1:3000/rest/;
        proxy_read_timeout 120s;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:3000/storage/;
        proxy_read_timeout 120s;
        client_max_body_size 100M;
    }

    # Edge Functions (через API → Deno)
    location /functions/ {
        proxy_pass http://127.0.0.1:3000/functions/;
        proxy_read_timeout 300s;
    }

    # RPC (PostgREST-compatible)
    location /rpc/ {
        proxy_pass http://127.0.0.1:3000/rpc/;
        proxy_read_timeout 120s;
    }

    # ══════════════════════════════════════════════
    # FFmpeg API — контейнер aimuza-ffmpeg:3001 (→ 127.0.0.1:3100)
    # ══════════════════════════════════════════════
    location /api/ffmpeg/ {
        proxy_pass http://127.0.0.1:3100/;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 500M;
    }

    # ══════════════════════════════════════════════
    # Radio Engine — контейнер aimuza-radio (Icecast:8000, Controller:3200)
    # ══════════════════════════════════════════════
    location /radio/stream.mp3 {
        proxy_pass http://127.0.0.1:8000/radio.mp3;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        tcp_nodelay on;
        gzip off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache, no-store" always;
    }
    location /radio/stream.opus {
        proxy_pass http://127.0.0.1:8000/radio.opus;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        tcp_nodelay on;
        gzip off;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache, no-store" always;
    }
    location /radio/status {
        proxy_pass http://127.0.0.1:8000/status-json.xsl;
    }
    location /radio/api/ {
        proxy_pass http://127.0.0.1:3200/api/;
        proxy_read_timeout 30s;
    }
    location /radio/ws {
        proxy_pass http://127.0.0.1:3200/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ══════════════════════════════════════════════
    # Realtime WebSocket — контейнер aimuza-realtime:4000
    # ══════════════════════════════════════════════
    location /realtime/v1/websocket {
        proxy_pass http://127.0.0.1:4000/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /realtime/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # ══════════════════════════════════════════════
    # Health check
    # ══════════════════════════════════════════════
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }
}
